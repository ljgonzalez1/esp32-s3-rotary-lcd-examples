; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Reference:
; https://docs.platformio.org/page/projectconf.html


; .ini with somewhat detailed documentation as I didn't know what did what.
; Notes for the future...

; ========================= REUSABLE BASE SECTIONS =========================
; These sections are configuration fragments.
; They are not buildable environments by themselves.
; They are intended to be reused through `extends = ...` from real envs.
; Do not select sections named `[__...]` directly with `pio run -e ...`.

[__base-host]
; Local upload/monitor port pattern.
; Usually appears as /dev/ttyACM0 on Linux,
; PlatformIO accepts glob-like patterns such as [012], *, and ?.
; CHANGE ACCORDING TO YOUR BOARD LOCATION.
upload_port = /dev/ttyACM[012]

[__base-core]
; PlatformIO Espressif platform version pinning.
platform = espressif32@6.12.0

; Board profile used as the closest available PlatformIO base.
; Included ESP board: ESP32S3 Dev Module
; Actual hardware: VIEWE UEDX48480021-MD80ET / ESP32-S3 N16R8 class.
; Required board-specific support is provided by flags, sdkconfig, partitions
; and the vendored VIEWE libraries.
board = esp32-s3-devkitc-1

; ESP-IDF framework build.
; This project IS NOT using the Arduino framework as the primary framework.
framework = espidf

[__base-pkgs]
; Pinned framework/toolchain packages for more reproducible builds.
; IMPORTANT:
; If a child env defines `platform_packages` again, PlatformIO treats that as
; replacing/overriding this package list, not appending to it.
platform_packages =
	framework-espidf@3.50301.0
	toolchain-xtensa-esp-elf@13.2.0+20240530
	toolchain-riscv32-esp@13.2.0+20240530
	tool-esptoolpy@2.40900.250804

[__base-serial]
; Reuse the same detected USB CDC/JTAG port for upload and serial monitor.
upload_port = ${__base-host.upload_port}
monitor_port = ${__base-host.upload_port}
; Serial monitor filters:
;   default                 normal PlatformIO serial output
;   time                    prepend timestamps
;   esp32_exception_decoder decode ESP32 backtraces when possible
;   send_on_enter           send typed text only after Enter
;   colorize                ANSI color output, if supported by your terminal
monitor_filters = default, time, esp32_exception_decoder, send_on_enter
; Use esptool for flashing
upload_protocol = esptool
; Keep DTR/RTS inactive in the monitor.
; Those lines can cause unwanted resets or boot-mode transitions.
monitor_dtr = 0
monitor_rts = 0

[__base-board]
; Hardware memory profile: 16 MB flash + 8 MB PSRAM.
; Keep this aligned with sdkconfig.defaults and the partition table.
board_upload.maximum_size = 16777216
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_upload.maximum_ram_size = 8388608
; Flash/PSRAM electrical and protocol configuration.
; `qio` = Quad I/O flash mode.
; `qspi` = Quad SPI PSRAM.
board_build.flash_mode = qio
board_build.psram_type = qspi
; C++ dialect used for the project.
; gnu++2a is the GCC name for the C++20 draft mode.
; Some ESP-IDF / VIEWE / Espressif libraries require at least C++17 features.
board_build.cppstd = gnu++2a
; Filesystem image type used by PlatformIO filesystem targets.
board_build.filesystem = littlefs
; Flash upload baudrate.
; Lower this if uploads are unreliable on your cable/hub/USB port.
upload_speed = 921600
; Baudrate for serial monitor.
monitor_speed = 115200
; CPU and flash clock frequency.
; 240 MHz
board_build.f_cpu = 240000000L
; 80 MHz
board_build.f_flash = 80000000L

[__knob-libs]
; Root directory containing the vendored VIEWE / Espressif Arduino-style libs.
; PlatformIO will scan this directory for libraries.
lib_extra_dirs =
	./third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries
; Manual include paths for the vendored libraries.
;
; These make headers visible to the compiler even when the library dependency
; finder does not automatically discover them.
;
; Note:
; `-I` only controls header search paths. It does not, by itself, guarantee
; that a library's source files are compiled or linked. `lib_extra_dirs`,
; direct includes, and PlatformIO's dependency finder still determine what is
; built.
build_flags =
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ESP32_Display_Panel/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ESP32_Button/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ESP32_Display_Panel/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ESP32_IO_Expander/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ESP32_Knob/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/esp-lib-utils/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/lvgl-release-v8.4/src
	-I third_party/viewesmart-md80esp32-knob-2.1inch-fork/Libraries/ui/src

[__libs]
; Library search roots.
; Inherited by build environments through `extends`.
lib_extra_dirs =
	${__knob-libs.lib_extra_dirs}

[__lib_flags]
; Include flags for vendor libraries.
; Kept separate so optimization profiles can opt into these flags explicitly.
build_flags =
	${__knob-libs.build_flags}

[__base-flags]
; Remove older or conflicting C++ standard flags that may be injected by
; framework defaults, libraries, or previous configs.
; Don't know why, wasn't working without this. Maybe some library was using C++17
; features and the default was an older version.
build_unflags =
	-std=gnu++9 -std=gnu++10 -std=gnu++11 -std=gnu++12 -std=gnu++13 -std=gnu++14 -std=gnu++17 -std=gnu++20
	-std=c++9   -std=c++10   -std=c++11   -std=c++12   -std=c++13   -std=c++14   -std=c++17   -std=c++2a -std=C++20

; Common compile flags shared by all environments.
;
; ESP_PANEL_KCONFIG_IGNORE lets ESP32_Display_Panel avoid relying on generated
; Kconfig values in some PlatformIO setups.
build_flags =
	-I src/check_libs/watch
	-std=gnu++2a
	-DARDUHAL_LOG_COLORS=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_USE=1
	-DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
	-DCORE_DEBUG_LEVEL=0
	-DESP_PANEL_KCONFIG_IGNORE
	-DLV_CONF_INCLUDE_SIMPLE

[__base-scripts]
; Pre-build script.
; Usually used here to ensure Python dependencies required by PlatformIO,
; partition tooling, or helper scripts are available before compiling.
extra_scripts = pre:scripts/ensure_python_deps.py

; ============================== TEST PROFILE ==============================
[__profile-test]
; Unity test framework over serial.
; `test_build_src = no` means tests are built without automatically compiling
; normal application sources as part of the test binary.
test_framework = unity
test_transport = serial
test_build_src = no

; =============================== OTA PROFILE ===============================
[__profile-ota]
; Partition table for 16 MB flash with OTA layout.
; Keep this file consistent with board_upload.maximum_size and flash_size.
board_build.partitions = partitions/partitions_16mb_ota.csv

; =========================== OPTIMIZATION PROFILES ==========================
[__compressed-flags]
; Optimized/release-like build profile.
;
; This is not "compression" in the archive sense. It enables compiler/linker
; optimizations and removes unused sections:
;   -O2                  optimize generated code (O0...O3)
;   -g0                  omit debug symbols (g0...g3)
;   -ffunction-sections  place each function in its own linker section
;   -fdata-sections      place each data object in its own linker section
;   -Wl,--gc-sections    remove unused sections at link time
build_unflags = ${__base-flags.build_unflags} -Os -O0 -Og -g2 -g3 -g1
build_flags =
	${__base-flags.build_flags}
	${__lib_flags.build_flags}
	-O2
	-g0
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections

[__uncompressed-flags]
; Debug/no-optimization build profile.
;
; This keeps optimization disabled with `-O0` and includes debug information
; with `-g2`.
;
; Note:
; Despite the name "uncompressed", this still uses section garbage collection
; through `-Wl,--gc-sections`, so unused code/data may still be discarded.
build_unflags = ${__base-flags.build_unflags} -O1 -O2 -O3 -g0 -g1
build_flags =
	${__base-flags.build_flags}
	${__lib_flags.build_flags}
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-O0
	-g2

; ============================== BASE ENVIRONMENTS ==============================
; Internal envs.
; These combine the reusable sections above into concrete build configurations.
; They are still prefixed with `_` to indicate they are mainly meant as parents
; for the shorter "real" env names below.

[env:_esp32-s3-n16-r8-ota-dev]
; Development OTA env:
;   - ESP-IDF
;   - pinned packages
;   - USB serial/upload
;   - 16 MB flash / 8 MB PSRAM profile
;   - OTA partitions
;   - vendored libraries
;   - debug/no-optimization flags
extends = __base-core, __base-pkgs, __base-serial, __base-scripts, __base-board, __base-flags, __profile-ota, __libs, __uncompressed-flags

; This overrides platform_packages from __base-pkgs.
; Keep in mind that redefining platform_packages in a child env replaces the
; inherited package list rather than appending to it.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

[env:_esp32-s3-n16-r8-ota-prod]
; Production OTA env.
;
; Current behavior:
; This currently extends __uncompressed-flags, so it behaves like a debug /
; no-optimization build, not like the optimized profile above.
;
; If the intention is an optimized production build, this would usually extend
; __compressed-flags instead. Left unchanged here because this file preserves
; functional content exactly.
extends = __base-core, __base-pkgs, __base-serial, __base-scripts, __base-board, __base-flags, __profile-ota, __libs, __uncompressed-flags

; This overrides platform_packages from __base-pkgs.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

[env:_esp32-s3-n16-r8-ota-test]
; Test OTA env:
;   - optimized flags from __compressed-flags
;   - Unity serial test profile
extends = __base-core, __base-pkgs, __base-serial, __base-scripts, __base-board, __base-flags, __profile-ota, __libs, __compressed-flags, __profile-test

; This overrides platform_packages from __base-pkgs.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

; ============================== REAL ENVIRONMENTS ==============================
; Short user-facing env names.
; These are the ones you normally select with:
;   pio run -e esp32s3-dev
;   pio run -e esp32s3-test
;   pio run -e esp32s3-prod
;   pio run -e esp32s3usbotg

[env:esp32s3-dev]
extends = env:_esp32-s3-n16-r8-ota-dev

; This overrides platform_packages inherited from the parent env.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

[env:esp32s3-test]
extends = env:_esp32-s3-n16-r8-ota-test

; This overrides platform_packages inherited from the parent env.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

[env:esp32s3-prod]
extends = env:_esp32-s3-n16-r8-ota-prod

; This overrides platform_packages inherited from the parent env.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

[env:esp32s3usbotg]
extends = env:esp32s3-dev

; This overrides platform_packages inherited from the parent env.
platform_packages = platformio/tool-esptoolpy@^2.40900.250804

; ============================== DEFAULT ENV ==============================
[platformio]
; Environment used when running plain:
;   pio run
;   pio run -t upload
; without `-e <env>`.
default_envs = esp32s3usbotg